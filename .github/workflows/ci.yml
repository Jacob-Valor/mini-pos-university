name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:10.11
        env:
          MARIADB_ROOT_PASSWORD: root_password
          MARIADB_DATABASE: mini_pos
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-start-period=30s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore mini_pos.sln

      - name: Build
        run: dotnet build mini_pos.sln --no-restore -c Release

      - name: Test
        run: dotnet test tests/mini_pos.Tests/mini_pos.Tests.csproj --no-build -c Release --collect:"XPlat Code Coverage"
        env:
          DB_HOST: localhost
          DB_PORT: 3306
          DB_NAME: mini_pos
          DB_USER: root
          DB_PASSWORD: root_password

      - name: Test API
        run: dotnet test tests/mini_pos.Api.Tests/mini_pos.Api.Tests.csproj --no-build -c Release --collect:"XPlat Code Coverage"

      - name: Enforce desktop coverage
        run: python3 scripts/check_coverage.py --path "tests/mini_pos.Tests/TestResults/*/coverage.cobertura.xml" --package mini_pos --min-line 50

      - name: Enforce API coverage
        run: python3 scripts/check_coverage.py --path "tests/mini_pos.Api.Tests/TestResults/*/coverage.cobertura.xml" --package mini_pos.Api --min-line 45

      - name: Upload coverage reports
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            tests/mini_pos.Tests/TestResults/*/coverage.cobertura.xml
            tests/mini_pos.Api.Tests/TestResults/*/coverage.cobertura.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            tests/mini_pos.Tests/TestResults/
            tests/mini_pos.Api.Tests/TestResults/
